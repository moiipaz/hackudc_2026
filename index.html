<div class="card" style="margin-bottom:16px;">
  <h2>Usuario</h2>

  <div class="row">
    <label>
      Nombre
      <input id="uNombre" type="text" placeholder="Ana García" />
    </label>
    <label>
      Email
      <input id="uEmail" type="email" placeholder="ana@email.com" />
    </label>
  </div>

  <div class="row actions">
    <button type="button" id="btnCrearUsuario">Crear usuario</button>
    <button type="button" id="btnCargarUsuarios" class="secondary">Cargar usuarios</button>
  </div>

  <label>
    Usuario activo
    <select id="usuarioSelect"></select>
  </label>
</div>
